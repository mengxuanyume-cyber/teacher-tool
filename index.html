<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes">
    <title>档案工坊 ｜ 平成国际</title>
    <script src="https://cdn.sheetjs.com/xlsx-0.20.2/package/dist/xlsx.full.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/html2canvas/1.4.1/html2canvas.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jszip/3.10.1/jszip.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.0/dist/chart.umd.min.js"></script>
    <!-- chartjs-plugin-datalabels 用于在折线图上直接显示数值 -->
    <script src="https://cdn.jsdelivr.net/npm/chartjs-plugin-datalabels@2.0.0/dist/chartjs-plugin-datalabels.min.js"></script>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            background: #0a1128;
            font-family: 'Segoe UI', 'Poppins', 'Noto Sans JP', 'Roboto', sans-serif;
            padding: 40px 24px;
            color: #eef5ff;
            background-image: radial-gradient(circle at 10% 20%, rgba(15, 30, 70, 0.9) 0%, #030617 100%);
            position: relative;
        }
        body::before {
            content: '';
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background-image: url('data:image/svg+xml;utf8,<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 800"><circle cx="20" cy="30" r="1.5" fill="white" opacity="0.7"/><circle cx="150" cy="80" r="1" fill="white" opacity="0.5"/><circle cx="300" cy="50" r="2" fill="white" opacity="0.8"/><circle cx="500" cy="120" r="1.2" fill="white" opacity="0.6"/><circle cx="800" cy="60" r="1.8" fill="white" opacity="0.9"/><circle cx="1050" cy="200" r="2" fill="white" opacity="0.7"/><circle cx="80" cy="400" r="1.5" fill="white" opacity="0.5"/><circle cx="350" cy="650" r="2" fill="white" opacity="0.6"/><circle cx="700" cy="500" r="1.3" fill="white" opacity="0.8"/><circle cx="1100" cy="700" r="1.7" fill="white" opacity="0.7"/><circle cx="950" cy="350" r="1" fill="white" opacity="0.4"/></svg>');
            background-repeat: repeat;
            background-size: 300px;
            pointer-events: none;
            opacity: 0.25;
            z-index: 0;
        }
        .container { max-width: 1400px; margin: 0 auto; position: relative; z-index: 2; }
        .control-panel {
            background: rgba(6, 18, 44, 0.7);
            backdrop-filter: blur(12px);
            border-radius: 2rem;
            padding: 1.5rem 2rem;
            margin-bottom: 2.5rem;
            border: 1px solid rgba(64, 128, 255, 0.4);
            box-shadow: 0 10px 30px -10px rgba(0, 0, 0, 0.5);
            display: flex;
            flex-wrap: wrap;
            gap: 1.2rem;
            align-items: flex-end;
            justify-content: space-between;
        }
        .input-group { display: flex; flex-direction: column; gap: 0.5rem; }
        .input-group label { font-size: 0.85rem; font-weight: 500; letter-spacing: 1px; color: #b3e4ff; }
        .input-group input, .btn {
            background: #0a1a3a;
            border: 1px solid #2c5282;
            padding: 0.6rem 1.2rem;
            border-radius: 2rem;
            color: white;
            font-size: 0.9rem;
            transition: 0.2s;
        }
        .input-group input:focus { outline: none; border-color: #3b82f6; box-shadow: 0 0 8px #3b82f6; }
        .btn {
            background: linear-gradient(135deg, #1e3a8a, #0f2c6b);
            cursor: pointer;
            font-weight: bold;
            display: inline-flex;
            align-items: center;
            gap: 8px;
            border: none;
            box-shadow: 0 2px 6px rgba(0,0,0,0.3);
        }
        .btn-primary { background: linear-gradient(135deg, #2563eb, #1e40af); border: 1px solid #60a5fa; }
        .btn-primary:hover { background: linear-gradient(135deg, #3b82f6, #1e3a8a); transform: translateY(-2px); }
        .btn-outline { background: transparent; border: 1px solid #3b82f6; }
        .btn-outline:hover { background: rgba(59,130,246,0.2); }
        .stats-badge { background: #0f2c4e; border-radius: 2rem; padding: 0.4rem 1rem; font-size: 0.8rem; }
        .students-grid { display: flex; flex-wrap: wrap; gap: 2rem; justify-content: center; }
        .report-card {
            width: 720px;
            background: linear-gradient(145deg, #071a3a, #04102b);
            border-radius: 2rem;
            overflow: hidden;
            box-shadow: 0 20px 35px -15px rgba(0, 0, 0, 0.6), 0 0 0 1px rgba(59,130,246,0.2);
            backdrop-filter: blur(2px);
            transition: transform 0.2s;
        }
        .report-card:hover { transform: translateY(-5px); }
        .card-header {
            background: rgba(0, 20, 60, 0.7);
            padding: 1.2rem 1.8rem;
            border-bottom: 2px solid #2b6cb0;
        }
        .student-name { font-size: 1.8rem; font-weight: 800; color: #ffffff; letter-spacing: 2px; }
        .basic-info {
            display: flex;
            flex-wrap: wrap;
            justify-content: space-between;
            margin-top: 0.8rem;
            font-size: 0.85rem;
            color: #bfd9ff;
            gap: 12px;
        }
        .section-title {
            font-size: 1.2rem;
            font-weight: 700;
            margin: 1rem 0 0.8rem 0;
            padding-left: 1rem;
            border-left: 4px solid #3b82f6;
            color: #ffffff !important;
        }
        .score-table {
            width: 100%;
            border-collapse: collapse;
            margin: 0.8rem 0;
            font-size: 0.8rem;
            background: rgba(0, 0, 0, 0.2);
            border-radius: 1rem;
            overflow: hidden;
        }
        .score-table th, .score-table td {
            padding: 0.6rem 0.3rem;
            text-align: center;
            border-bottom: 1px solid rgba(72, 128, 200, 0.3);
            vertical-align: middle;
        }
        .score-table th {
            background: #0c2348;
            color: #ffffff !important;
            font-weight: 600;
        }
        .trend-up { color: #4ade80; font-weight: bold; }
        .trend-down { color: #f87171; font-weight: bold; }
        .eval-badge {
            display: inline-block;
            padding: 0.2rem 0.6rem;
            border-radius: 20px;
            font-size: 0.7rem;
            font-weight: bold;
            background: #1e3a5f;
            color: white;
        }
        .eval-excellent { background: #15803d; color: white; }
        .eval-good { background: #2b6e9e; color: white; }
        .eval-average { background: #b45309; color: white; }
        .eval-poor { background: #9b2c2c; color: white; }
        .radar-container {
            background: rgba(1, 10, 30, 0.5);
            border-radius: 1.2rem;
            padding: 0.8rem;
            margin: 1rem 0;
        }
        canvas.radar-canvas { max-height: 200px; width: 100%; }
        .daily-chart-container {
            background: rgba(1, 10, 30, 0.5);
            border-radius: 1.2rem;
            padding: 0.8rem;
            margin: 0.5rem 0 1rem 0;
        }
        canvas.daily-canvas { width: 100%; height: 180px; background: #03112b; border-radius: 1rem; }
        .edit-field {
            background: #03112b;
            border-radius: 1rem;
            padding: 0.6rem 0.8rem;
            margin: 0.6rem 0;
        }
        .edit-field label { font-size: 0.7rem; color: #7ca9e0; display: block; margin-bottom: 4px; }
        .edit-field input, .edit-field textarea {
            width: 100%;
            background: #0a1f3e;
            border: 1px solid #2c5a8c;
            border-radius: 1rem;
            padding: 0.5rem 0.8rem;
            color: white;
            font-size: 0.85rem;
            font-family: inherit;
            resize: vertical;
        }
        .card-actions { display: flex; justify-content: center; gap: 12px; padding: 1rem 1.5rem 1.8rem; }
        .small-btn {
            background: #142d54;
            border: none;
            border-radius: 2rem;
            padding: 0.4rem 1rem;
            font-size: 0.7rem;
            color: white;
            cursor: pointer;
            transition: 0.2s;
        }
        .small-btn:hover { background: #2563eb; }
        .footer-note {
            text-align: center;
            margin-top: 3rem;
            color: #6c86a8;
            font-size: 0.75rem;
        }
        @media (max-width: 750px) { .report-card { width: 95%; } .control-panel { flex-direction: column; align-items: stretch; } }
        .btn-download-template { background: linear-gradient(135deg, #0f4c5c, #0a3a48); border-color: #2c9aaf; }
        .info-tip { font-size: 0.7rem; color: #8aaee0; margin-top: 4px; }
        .report-card .student-name,
        .report-card .basic-info,
        .report-card .basic-info span,
        .report-card .section-title,
        .report-card .score-table th,
        .report-card .score-table td,
        .report-card .edit-field div {
            color: #ffffff !important;
        }
        .trend-up, .trend-down { color: inherit; }
        .trend-up { color: #4ade80 !important; }
        .trend-down { color: #f87171 !important; }
    </style>
</head>
<body>
<div class="container">
    <div class="control-panel">
        <div class="input-group">
            <label>👩‍🏫 授课教师</label>
            <input type="text" id="teacherName" placeholder="例: 森 老师" value="森 老师">
        </div>
        <div class="input-group">
            <label>📂 上传Excel档案 (.xlsx)</label>
            <input type="file" id="excelUpload" accept=".xlsx, .xls" style="display:none;">
            <button class="btn" id="uploadBtn">📎 选择文件上传</button>
        </div>
        <div class="input-group">
            <button class="btn btn-download-template" id="downloadTemplateBtn">📥 Excel模板下载</button>
            <div class="info-tip">✨ 模板支持AI填写</div>
        </div>
        <div class="input-group">
            <button class="btn btn-outline" id="downloadAllBtn">📦 导出全班档案 (ZIP)</button>
        </div>
        <div class="input-group">
            <button class="btn btn-outline" id="deleteAllBtn">🗑️ 删除全班档案</button>
        </div>
        <div class="stats-badge" id="studentCountBadge">⚡ 等待上传数据</div>
    </div>

    <div id="studentsContainer" class="students-grid">
        <div style="text-align: center; width: 100%; padding: 3rem;">✨ 请上传符合模板的Excel档案 ✨</div>
    </div>
    <div class="footer-note">⭐ 最近一次考试成绩一览 | 各题型得分雷达图 | 日常听写成绩折线图</div>
</div>

<script>
    // 注册 datalabels 插件
    Chart.register(ChartDataLabels);
    
    // 获取当前日期，格式 YYYY年MM月DD日 (用于档案生成日期)
    function getFormattedDate() {
        const now = new Date();
        const year = now.getFullYear();
        const month = String(now.getMonth() + 1).padStart(2, '0');
        const day = String(now.getDate()).padStart(2, '0');
        return `${year}年${month}月${day}日`;
    }
    
    let currentStudents = [];
    let teacherInput = document.getElementById('teacherName');
    let container = document.getElementById('studentsContainer');
    let uploadInput = document.getElementById('excelUpload');
    let uploadBtn = document.getElementById('uploadBtn');
    let downloadAllBtn = document.getElementById('downloadAllBtn');
    let downloadTemplateBtn = document.getElementById('downloadTemplateBtn');
    let deleteAllBtn = document.getElementById('deleteAllBtn');
    let studentCountSpan = document.getElementById('studentCountBadge');
    let chartInstances = {};      // 雷达图实例
    let dailyChartInstances = {}; // 日常成绩折线图实例

    // 解析分数和变化（支持半角/全角括号）
    function parseScoreAndChange(value) {
        if (value === undefined || value === null || value === '') return { score: null, change: null };
        let str = String(value).trim();
        let match = str.match(/^([+-]?\d+(?:\.\d+)?)[\s]*[（(]([+-]?\d+(?:\.\d+)?)[）)]/);
        if (match) {
            let score = parseFloat(match[1]);
            let change = parseFloat(match[2]);
            return { score: isNaN(score) ? null : score, change: (change !== null && !isNaN(change)) ? change : null };
        }
        let num = parseFloat(str);
        if (!isNaN(num)) return { score: num, change: null };
        return { score: null, change: null };
    }

    function getRatingFromRate(rate) {
        if (rate >= 90) return "优秀";
        if (rate >= 80) return "良好";
        if (rate >= 65) return "一般";
        return "待进步";
    }

    // 解析日常成绩字符串 -> 数字数组
    function parseDailyScores(scoreStr) {
        if (!scoreStr || typeof scoreStr !== 'string') return [];
        let parts = scoreStr.split(/[ ,;]+/).filter(p => p.trim().length > 0);
        let nums = [];
        for (let p of parts) {
            let n = parseFloat(p);
            if (!isNaN(n)) nums.push(n);
        }
        return nums;
    }

    // 核心解析：严格按照Excel列顺序解析题型 + 日常成绩列
    function parseExcelToStudents(dataRows, headers) {
        let students = [];
        let nameIdx = headers.findIndex(h => h && (h.includes('学生姓名') || h === '姓名'));
        let classIdx = headers.findIndex(h => h && (h.includes('班级编号') || h === '班级'));
        let attendCountIdx = headers.findIndex(h => h && (h.includes('上课次数') || h === '出勤次数'));
        let totalScoreRawIdx = headers.findIndex(h => h && h.includes('总分得分'));
        let totalFullIdx = headers.findIndex(h => h && (h.includes('总分满分') || h === '总分满分'));
        let passStatusIdx = headers.findIndex(h => h && h.includes('及格情况'));
        // 日常成绩列: 优先匹配“日常成绩”
        let dailyScoreIdx = headers.findIndex(h => h && (h === '日常成绩' || (h.includes('日常成绩') && !h.includes('平均分'))));
        if (dailyScoreIdx === -1) dailyScoreIdx = headers.findIndex(h => h && (h === '日常成绩平均分' || h.includes('日常成绩平均分')));
        let homeworkIdx = headers.findIndex(h => h && (h.includes('作业提交情况') || h === '作业情况'));
        let attendanceDetailIdx = headers.findIndex(h => h && (h.includes('出勤详情') || h === '出勤记录'));
        let suggestionIdx = headers.findIndex(h => h && (h.includes('综合建议') || h === '建议' || h === '教师建议'));

        if (nameIdx === -1) throw new Error('Excel必须包含“学生姓名”列');

        let subjectDefs = [];
        for (let i = 0; i < headers.length; i++) {
            let col = headers[i];
            if (!col || typeof col !== 'string') continue;
            if (col.includes('得分') && !col.includes('总分得分') && !(col === '总分得分')) {
                let typeName = col.replace('得分', '').trim();
                if (typeName === "") continue;
                let fullIdx = -1;
                let evalIdx = -1;
                for (let j = i+1; j < headers.length; j++) {
                    let nextCol = headers[j];
                    if (nextCol && nextCol.includes('满分')) {
                        fullIdx = j;
                        break;
                    }
                }
                if (fullIdx !== -1) {
                    for (let k = fullIdx+1; k < headers.length; k++) {
                        let candidate = headers[k];
                        if (candidate && (candidate === '评价' || candidate.includes('评价'))) {
                            evalIdx = k;
                            break;
                        }
                    }
                }
                if (fullIdx === -1) continue;
                subjectDefs.push({
                    typeName: typeName,
                    scoreIdx: i,
                    fullIdx: fullIdx,
                    evalIdx: evalIdx
                });
            }
        }

        for (let rowIdx = 0; rowIdx < dataRows.length; rowIdx++) {
            const row = dataRows[rowIdx];
            if (!row[nameIdx] || String(row[nameIdx]).trim() === '') continue;
            let totalScoreRaw = totalScoreRawIdx !== -1 ? row[totalScoreRawIdx] : null;
            let totalParsed = totalScoreRaw ? parseScoreAndChange(totalScoreRaw) : { score: null, change: null };
            let totalFullFromExcel = (totalFullIdx !== -1 && row[totalFullIdx] !== undefined && row[totalFullIdx] !== null) ? parseFloat(row[totalFullIdx]) : null;
            let passStatus = passStatusIdx !== -1 && row[passStatusIdx] ? String(row[passStatusIdx]) : '';
            
            // 日常成绩原始字符串
            let dailyRaw = (dailyScoreIdx !== -1 && row[dailyScoreIdx]) ? String(row[dailyScoreIdx]).trim() : '';
            let dailyScores = parseDailyScores(dailyRaw);
            
            let student = {
                name: String(row[nameIdx]).trim(),
                classId: classIdx !== -1 ? String(row[classIdx] || '') : '未指定',
                attendCount: attendCountIdx !== -1 ? row[attendCountIdx] : 0,
                dailyScoreRaw: dailyRaw,
                dailyScores: dailyScores,
                homeworkStatus: homeworkIdx !== -1 ? row[homeworkIdx] : '提交率90%',
                attendanceDetail: attendanceDetailIdx !== -1 ? String(row[attendanceDetailIdx] || '全勤') : '全勤',
                totalScore: totalParsed.score,
                totalChange: totalParsed.change,
                totalFull: totalFullFromExcel,
                passStatus: passStatus,
                subjects: [],
                comment: suggestionIdx !== -1 && row[suggestionIdx] ? String(row[suggestionIdx]) : '继续保持努力，加强薄弱题型训练。'
            };
            
            for (let def of subjectDefs) {
                let scoreCell = row[def.scoreIdx];
                let fullCell = row[def.fullIdx];
                let evalCell = (def.evalIdx !== -1 && row[def.evalIdx]) ? String(row[def.evalIdx]).trim() : '';
                if (scoreCell === undefined || scoreCell === null || scoreCell === '') continue;
                let { score, change } = parseScoreAndChange(scoreCell);
                if (score === null) continue;
                let fullVal = (fullCell !== undefined && fullCell !== null) ? parseFloat(fullCell) : null;
                if (fullVal === null || isNaN(fullVal) || fullVal === 0) continue;
                let rate = (score / fullVal) * 100;
                let evaluation = evalCell;
                if (!evaluation) evaluation = getRatingFromRate(rate);
                student.subjects.push({
                    name: def.typeName,
                    score: score,
                    fullScore: fullVal,
                    change: change,
                    rate: rate,
                    evaluation: evaluation
                });
            }
            
            const orderMap = new Map();
            subjectDefs.forEach((def, idx) => { orderMap.set(def.typeName, idx); });
            student.subjects.sort((a,b) => (orderMap.get(a.name) ?? 999) - (orderMap.get(b.name) ?? 999));
            
            if (student.totalFull === null || isNaN(student.totalFull) || student.totalFull === 0) {
                let sumFull = 0;
                for (let sub of student.subjects) sumFull += sub.fullScore;
                student.totalFull = sumFull > 0 ? sumFull : null;
            }
            students.push(student);
        }
        return students;
    }

    // 渲染所有卡片
    function renderAllCards(students, teacher) {
        // 清理所有图表实例
        for (let key in chartInstances) { if (chartInstances[key]) { chartInstances[key].destroy(); delete chartInstances[key]; } }
        for (let key in dailyChartInstances) { if (dailyChartInstances[key]) { dailyChartInstances[key].destroy(); delete dailyChartInstances[key]; } }
        container.innerHTML = '';
        if (!students.length) {
            container.innerHTML = '<div style="text-align: center; width: 100%; padding: 3rem;">📭 暂无学生数据，请上传正确的Excel文件</div>';
            studentCountSpan.innerText = '👥 0 人';
            return;
        }
        studentCountSpan.innerText = `👥 ${students.length} 人  · 星空档案已生成`;
        students.forEach((student, idx) => {
            const cardWrapper = createStudentCard(student, teacher, idx);
            container.appendChild(cardWrapper);
        });
        // 初始化雷达图和折线图
        students.forEach((student, idx) => {
            initRadarChart(idx, student.subjects);
            initDailyChart(idx, student);
        });
    }

    // 创建卡片（日常成绩折线图区域无输入框，只保留折线图并显示数值）
    function createStudentCard(student, teacher, idx) {
        const cardDiv = document.createElement('div');
        cardDiv.className = 'report-card';
        cardDiv.setAttribute('data-student-idx', idx);
        
        let totalScoreDisplay = (student.totalScore !== null && student.totalFull !== null) 
            ? `${student.totalScore} / ${student.totalFull}`
            : (student.totalScore !== null ? `${student.totalScore}分` : '--');
        let subjects = student.subjects;
        let theadRow = `<tr><th>项目</th>${subjects.map(s => `<th>${escapeHtml(s.name)}</th>`).join('')}<th>总分</th></tr>`;
        let scoreRow = `<tr><td style="background:#0f2348; font-weight:bold;">📊 得分/满分</td>
                        ${subjects.map(s => `<td>${s.score} / ${s.fullScore}</td>`).join('')}
                        <td>${totalScoreDisplay}</td>
                    </tr>`;
        let evalRow = `<tr><td style="background:#0f2348; font-weight:bold;">⭐ 评价</td>
                        ${subjects.map(s => {
                            let evalClass = 'eval-badge';
                            if (s.evaluation.includes('优秀')) evalClass += ' eval-excellent';
                            else if (s.evaluation.includes('良好')) evalClass += ' eval-good';
                            else if (s.evaluation.includes('一般')) evalClass += ' eval-average';
                            else if (s.evaluation.includes('待进步') || s.evaluation.includes('待改进') || s.evaluation.includes('较差')) evalClass += ' eval-poor';
                            return `<td><span class="${evalClass}">${escapeHtml(s.evaluation)}</span></td>`;
                        }).join('')}
                        <td>${student.passStatus ? `<span class="eval-badge">${escapeHtml(student.passStatus)}</span>` : '——'}</td>
                    </tr>`;
        let changeRow = `<tr><td style="background:#0f2348; font-weight:bold;">📈 分数变化</td>
                        ${subjects.map(s => {
                            if (s.change !== null && !isNaN(s.change)) {
                                let cls = s.change >= 0 ? 'trend-up' : 'trend-down';
                                let sign = s.change >= 0 ? `+${s.change}` : `${s.change}`;
                                return `<td class="${cls}">${sign}</td>`;
                            } else return `<td style="color:#8aaee0;">——</td>`;
                        }).join('')}
                        <td>${(student.totalChange !== null && !isNaN(student.totalChange)) ? `<span class="${student.totalChange >= 0 ? 'trend-up' : 'trend-down'}">${student.totalChange >= 0 ? '+' : ''}${student.totalChange}</span>` : '——'}</td>
                    </tr>`;
        let rateListHtml = '<div style="font-size:0.75rem; margin-top:8px; display:flex; flex-wrap:wrap; gap:6px;">';
        subjects.forEach(sub => { rateListHtml += `<span style="background:#0f2d4f; padding:2px 8px; border-radius:20px;">${sub.name}: ${sub.rate.toFixed(0)}%</span>`; });
        rateListHtml += '</div>';
        
        // 获取档案生成当天日期（每次渲染卡片都取当前真实日期）
        const generationDate = getFormattedDate();
        
        cardDiv.innerHTML = `
            <div class="card-header">
                <div class="student-name">${escapeHtml(student.name)}</div>
                <div class="basic-info">
                    <span>📚 班级：${escapeHtml(student.classId)}</span>
                    <span>👩‍🏫 授课教师：<span class="teacher-name-sync">${escapeHtml(teacher)}</span></span>
                    <span>📅 日期：${generationDate}</span>
                </div>
            </div>
            <div style="padding: 0 1.5rem;">
                <div class="section-title">📊 考试成绩分析</div>
                <table class="score-table">
                    <thead>${theadRow}</thead>
                    <tbody>${scoreRow}${evalRow}${changeRow}</tbody>
                </table>
                <div class="section-title">🎯 各题型得分率</div>
                <div class="radar-container">
                    <canvas class="radar-canvas" id="radarCanvas_${idx}" width="400" height="200" style="width:100%; height:auto; max-height:200px"></canvas>
                </div>
                ${rateListHtml}
                
                <!-- 日常成绩折线图区域（无输入框，直接展示折线图且显示数据标签） -->
                <div class="section-title">📈 日常成绩折线图</div>
                <div class="daily-chart-container">
                    <canvas id="dailyChartCanvas_${idx}" class="daily-canvas" style="width:100%; height:180px;"></canvas>
                </div>
                
                <div class="section-title">📋 日常表现</div>
                <div class="edit-field">
                    <label>📅 出勤详情</label>
                    <input type="text" class="attendance-detail-input" value="${escapeHtml(student.attendanceDetail)}">
                </div>
                <div class="edit-field">
                    <label>✏️ 作业提交情况</label>
                    <input type="text" class="homework-input" value="${escapeHtml(student.homeworkStatus)}">
                </div>
                <div class="section-title">💡 综合建议</div>
                <div class="edit-field">
                    <textarea class="advice-textarea" style="min-height:70px;">${escapeHtml(student.comment)}</textarea>
                </div>
            </div>
        `;
        
        // 获取可编辑字段元素（日常成绩已无输入框，只保留出勤、作业、建议）
        const attendanceInput = cardDiv.querySelector('.attendance-detail-input');
        const homeworkInput = cardDiv.querySelector('.homework-input');
        const adviceTextarea = cardDiv.querySelector('.advice-textarea');
        
        const updateStudentData = () => {
            student.attendanceDetail = attendanceInput.value;
            student.homeworkStatus = homeworkInput.value;
            student.comment = adviceTextarea.value;
            // 日常成绩不可编辑，无需更新
        };
        
        attendanceInput.addEventListener('input', updateStudentData);
        homeworkInput.addEventListener('input', updateStudentData);
        adviceTextarea.addEventListener('input', () => { updateStudentData(); autoResize(adviceTextarea); });
        const autoResize = (ta) => { ta.style.height = 'auto'; ta.style.height = Math.min(ta.scrollHeight, 200) + 'px'; };
        autoResize(adviceTextarea);
        
        const teacherSpan = cardDiv.querySelector('.teacher-name-sync');
        if (teacherSpan) teacherSpan.innerText = teacher;
        
        const cardContainer = document.createElement('div');
        cardContainer.style.display = 'flex';
        cardContainer.style.flexDirection = 'column';
        cardContainer.style.alignItems = 'center';
        cardContainer.style.marginBottom = '1rem';
        const actionsContainer = document.createElement('div');
        actionsContainer.className = 'card-actions';
        const downloadBtn = document.createElement('button');
        downloadBtn.className = 'small-btn download-single';
        downloadBtn.textContent = '⬇️ 导出档案（PNG）';
        downloadBtn.addEventListener('click', async (e) => {
            e.stopPropagation();
            updateStudentData();   // 确保出勤、作业、建议最新
            await ensureRadarRendered(idx, student.subjects);
            await ensureDailyChartRendered(idx, student);
            // 隐藏可编辑输入框转为纯文本
            const inputElems = cardDiv.querySelectorAll('.attendance-detail-input, .homework-input, .advice-textarea');
            const tempDivs = [];
            inputElems.forEach(input => {
                const parent = input.parentElement;
                const tempDiv = document.createElement('div');
                tempDiv.textContent = input.value;
                tempDiv.style.cssText = 'background:#0a1f3e; border:1px solid #2c5a8c; border-radius:1rem; padding:0.5rem 0.8rem; color:white; word-break:break-word;';
                input.style.display = 'none';
                parent.appendChild(tempDiv);
                tempDivs.push({ input, tempDiv });
            });
            const canvasImg = await html2canvas(cardDiv, { scale: 2.2, backgroundColor: '#04102b', logging: false, useCORS: true });
            tempDivs.forEach(({ input, tempDiv }) => { input.style.display = ''; tempDiv.remove(); });
            const link = document.createElement('a');
            link.download = `${student.name}_学习档案.png`;
            link.href = canvasImg.toDataURL();
            link.click();
        });
        const deleteBtn = document.createElement('button');
        deleteBtn.className = 'small-btn delete-single';
        deleteBtn.textContent = '🗑️ 删除档案';
        deleteBtn.addEventListener('click', () => {
            if (confirm(`确定删除 ${student.name} 的档案吗？`)) {
                currentStudents.splice(idx, 1);
                renderAllCards(currentStudents, teacherInput.value.trim() || '负责教师');
            }
        });
        actionsContainer.appendChild(downloadBtn);
        actionsContainer.appendChild(deleteBtn);
        cardContainer.appendChild(cardDiv);
        cardContainer.appendChild(actionsContainer);
        return cardContainer;
    }
    
    // 初始化折线图（带数据标签，显示每次具体分数）
    function initDailyChart(idx, student) {
        const canvas = document.getElementById(`dailyChartCanvas_${idx}`);
        if (!canvas) return;
        if (dailyChartInstances[idx]) dailyChartInstances[idx].destroy();
        const scores = student.dailyScores && student.dailyScores.length ? student.dailyScores : [];
        const labels = scores.map((_, i) => `第${i+1}次`);
        const ctx = canvas.getContext('2d');
        dailyChartInstances[idx] = new Chart(ctx, {
            type: 'line',
            data: {
                labels: labels,
                datasets: [{
                    label: '日常成绩',
                    data: scores,
                    borderColor: '#f97316',
                    backgroundColor: 'rgba(249,115,22,0.1)',
                    borderWidth: 2,
                    pointBackgroundColor: '#ffb347',
                    pointBorderColor: '#fff',
                    pointRadius: 4,
                    pointHoverRadius: 6,
                    tension: 0.2,
                    fill: true
                }]
            },
            options: {
                responsive: true,
                maintainAspectRatio: true,
                plugins: {
                    tooltip: { 
                        callbacks: { label: (ctx) => `${ctx.raw} 分` },
                        backgroundColor: '#0f2c4e',
                        titleColor: '#fff',
                        bodyColor: '#e2e8ff'
                    },
                    legend: { labels: { color: '#e2e8ff' } },
                    // 显示数据标签（每次成绩的数字）
                    datalabels: {
                        align: 'top',
                        offset: 6,
                        color: '#ffffff',
                        backgroundColor: 'rgba(0,0,0,0.65)',
                        borderRadius: 6,
                        padding: { left: 5, right: 5, top: 2, bottom: 2 },
                        font: { weight: 'bold', size: 11 },
                        formatter: (value) => value !== null ? value.toFixed(1) : ''
                    }
                },
                scales: {
                    y: { 
                        beginAtZero: true, 
                        grid: { color: 'rgba(100,150,230,0.3)' }, 
                        title: { display: true, text: '分数', color: '#c7e2ff' },
                        ticks: { color: '#c7e2ff' }
                    },
                    x: { ticks: { color: '#c7e2ff' }, grid: { display: false } }
                }
            }
        });
    }
    
    function updateDailyChart(idx, student) {
        if (dailyChartInstances[idx]) {
            const scores = student.dailyScores || [];
            const labels = scores.map((_, i) => `第${i+1}次`);
            dailyChartInstances[idx].data.labels = labels;
            dailyChartInstances[idx].data.datasets[0].data = scores;
            dailyChartInstances[idx].update();
        } else {
            initDailyChart(idx, student);
        }
    }
    
    async function ensureDailyChartRendered(idx, student) {
        if (dailyChartInstances[idx]) {
            updateDailyChart(idx, student);
            await new Promise(r => setTimeout(r, 50));
        } else {
            initDailyChart(idx, student);
            await new Promise(r => setTimeout(r, 50));
        }
    }
    
    async function ensureRadarRendered(idx, subjects) {
        if (!subjects.length) return;
        const canvas = document.getElementById(`radarCanvas_${idx}`);
        if (!canvas) return;
        if (chartInstances[idx]) {
            chartInstances[idx].data.datasets[0].data = subjects.map(s => s.rate);
            chartInstances[idx].update();
        } else {
            initRadarChart(idx, subjects);
        }
        await new Promise(resolve => setTimeout(resolve, 80));
    }
    
    // 雷达图配置：数字底色透明
    function initRadarChart(idx, subjects) {
        const canvas = document.getElementById(`radarCanvas_${idx}`);
        if (!canvas) return;
        if (chartInstances[idx]) chartInstances[idx].destroy();
        const labels = subjects.map(s => s.name);
        const rates = subjects.map(s => s.rate);
        if (labels.length === 0) return;
        chartInstances[idx] = new Chart(canvas.getContext('2d'), {
            type: 'radar',
            data: { 
                labels, 
                datasets: [{ 
                    label: '得分率 (%)', 
                    data: rates, 
                    backgroundColor: 'rgba(59,130,246,0.25)', 
                    borderColor: '#3b82f6', 
                    borderWidth: 2, 
                    pointBackgroundColor: '#60a5fa', 
                    pointBorderColor: '#ffffff', 
                    pointRadius: 3.5 
                }] 
            },
            options: { 
                responsive: true, 
                maintainAspectRatio: true, 
                scales: { 
                    r: { 
                        beginAtZero: true, 
                        max: 100, 
                        ticks: { 
                            stepSize: 20, 
                            color: '#f0f4ff',
                            backdropColor: 'transparent'   // 透明背景，去除灰色底色
                        }, 
                        grid: { color: 'rgba(100,150,230,0.35)' }, 
                        pointLabels: { color: '#c7e2ff' } 
                    } 
                }, 
                plugins: { 
                    tooltip: { callbacks: { label: (ctx) => `${ctx.label}: ${ctx.raw.toFixed(1)}%` } }, 
                    legend: { labels: { color: '#e2e8ff' } },
                    datalabels: { display: false }  // 雷达图不显示额外标签
                } 
            }
        });
    }
    
    function syncTeacherToAllCards(teacherName) {
        document.querySelectorAll('.teacher-name-sync').forEach(span => { span.innerText = teacherName; });
    }
    
    async function downloadAllAsZip() {
        if (!currentStudents.length) { alert('暂无学生档案'); return; }
        const zip = new JSZip();
        const cards = document.querySelectorAll('.report-card');
        if (!cards.length) return;
        for (let i = 0; i < cards.length; i++) {
            const card = cards[i];
            const student = currentStudents[i];
            if (!student) continue;
            const attInput = card.querySelector('.attendance-detail-input');
            const hwInput = card.querySelector('.homework-input');
            const advText = card.querySelector('.advice-textarea');
            if (attInput) student.attendanceDetail = attInput.value;
            if (hwInput) student.homeworkStatus = hwInput.value;
            if (advText) student.comment = advText.value;
            await ensureRadarRendered(i, student.subjects);
            await ensureDailyChartRendered(i, student);
            // 隐藏可编辑输入框（日常成绩无输入框，只隐藏其他）
            const inputElems = card.querySelectorAll('.attendance-detail-input, .homework-input, .advice-textarea');
            const tempDivs = [];
            inputElems.forEach(inp => {
                const div = document.createElement('div');
                div.textContent = inp.value;
                div.style.cssText = 'background:#0a1f3e; border:1px solid #2c5a8c; border-radius:1rem; padding:0.5rem 0.8rem; color:white;';
                inp.style.display = 'none';
                inp.parentElement.appendChild(div);
                tempDivs.push({ inp, div });
            });
            const canvasImg = await html2canvas(card, { scale: 2, backgroundColor: '#04102b', useCORS: true });
            tempDivs.forEach(({ inp, div }) => { inp.style.display = ''; div.remove(); });
            const imgData = canvasImg.toDataURL('image/png').split(',')[1];
            zip.file(`${student.name}_学习档案.png`, imgData, { base64: true });
        }
        const blob = await zip.generateAsync({ type: 'blob' });
        const link = document.createElement('a');
        link.href = URL.createObjectURL(blob);
        link.download = `全班_日语档案_${new Date().toISOString().slice(0,19)}.zip`;
        link.click();
        URL.revokeObjectURL(link.href);
    }

            "词汇得分", "词汇满分", "评价", "语法得分", "语法满分", "评价", 
            "阅读得分", "阅读满分", "评价", "听力得分", "听力满分", "评价",

    function handleExcelUpload(file) {
        const reader = new FileReader();
        reader.onload = function(e) {
            const data = new Uint8Array(e.target.result);
            const workbook = XLSX.read(data, { type: 'array' });
            const sheet = workbook.Sheets[workbook.SheetNames[0]];
            const rows = XLSX.utils.sheet_to_json(sheet, { header: 1, defval: "" });
            if (!rows.length) { alert('Excel无数据'); return; }
            const headers = rows[0].map(cell => String(cell || '').trim());
            const dataRows = rows.slice(1);
            try {
                let students = parseExcelToStudents(dataRows, headers);
                if (!students.length) throw new Error('未解析到有效学生');
                students = students.map(s => { if(!s.comment) s.comment = '查漏补缺，继续努力。'; return s; });
                currentStudents = students;
                renderAllCards(currentStudents, teacherInput.value.trim() || '负责教师');
            } catch(err) { alert('解析失败: '+err.message); console.error(err); }
        };
        reader.readAsArrayBuffer(file);
    }
    
    uploadBtn.addEventListener('click', () => uploadInput.click());
    uploadInput.addEventListener('change', (e) => { if(e.target.files.length) handleExcelUpload(e.target.files[0]); uploadInput.value = ''; });
    teacherInput.addEventListener('input', (e) => syncTeacherToAllCards(e.target.value.trim() || '负责教师'));
    downloadAllBtn.addEventListener('click', downloadAllAsZip);
    downloadTemplateBtn.addEventListener('click', downloadTemplateExcel);
    deleteAllBtn.addEventListener('click', () => { if(currentStudents.length && confirm('删除全班所有档案？')) { currentStudents = []; renderAllCards([], ''); } });
    function escapeHtml(str) { if(!str) return ''; return String(str).replace(/[&<>]/g, function(m) { if(m==='&') return '&amp;'; if(m==='<') return '&lt;'; if(m==='>') return '&gt;'; return m; }); }
</script>
