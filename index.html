<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=yes, viewport-fit=cover">
    <title>記録のサポートくん </title>
    <script src="https://cdn.sheetjs.com/xlsx-0.20.2/package/dist/xlsx.full.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.0/dist/chart.umd.min.js"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
    <style>
        * { box-sizing: border-box; font-family: system-ui, 'Segoe UI', 'Helvetica Neue', sans-serif; }
        body { background: #f0f7ff; margin: 0; padding: 12px; min-height: 100vh; }
        .auth-container { max-width: 400px; margin: 40px auto; background: white; border-radius: 32px; padding: 28px 24px; box-shadow: 0 12px 28px rgba(0,0,0,0.1); text-align: center; }
        .auth-container input, .auth-container button { width: 100%; padding: 12px; border-radius: 48px; margin-bottom: 12px; border: 1px solid #cbd5e1; }
        .app-container { max-width: 1400px; margin: 0 auto; background: white; border-radius: 28px; box-shadow: 0 12px 28px rgba(0,0,0,0.08); padding: 16px 18px 28px; display: none; overflow-x: auto; }
        .toolbar { display: flex; flex-wrap: wrap; align-items: center; gap: 12px; margin-bottom: 20px; border-bottom: 1px solid #e2edf2; padding-bottom: 16px; }
        .class-section { background: #f8fafc; padding: 6px 14px; border-radius: 48px; display: flex; gap: 8px; align-items: center; flex-wrap: wrap; }
        select, button, input[type="date"], input[type="number"] { padding: 8px 14px; border-radius: 48px; border: 1px solid #cbd5e1; background: white; font-size: 0.85rem; cursor: pointer; }
        button.primary { background: #2c6e9e; color: white; border: none; }
        .add-student-btn, .backup-btn { background: #e6f7e6; border-color: #b2d8a8; color: #2e6b2f; }
        .add-exam-btn { background: #ffe8e0; border-color: #ffc4a2; color: #b85c00; font-weight: bold; }
        .past-exam-btn { background: #e0f0ff; border-color: #aac9e4; color: #1e5a7a; font-weight: bold; }
        .search-area { background: #f8fafc; border-radius: 28px; padding: 12px 16px; margin-bottom: 20px; display: flex; flex-wrap: wrap; gap: 16px; align-items: flex-end; }
        .student-table-wrapper { overflow-x: auto; border-radius: 20px; }
        table { width: 100%; border-collapse: collapse; font-size: 0.8rem; min-width: 800px; }
        th { background: #eef3fc; padding: 12px 6px; }
        td { padding: 10px 6px; border-bottom: 1px solid #e9eef3; text-align: center; }
        .student-name-cell { background: #fefce8; min-width: 110px; }
        .icon-btn { background: none; border: none; font-size: 1rem; cursor: pointer; margin: 0 2px; }
        .modal { display: none; position: fixed; top:0; left:0; width:100%; height:100%; background: rgba(0,0,0,0.5); justify-content: center; align-items: center; z-index: 1000; }
        .modal-content { background: white; width: 95%; max-width: 1300px; max-height: 90vh; border-radius: 36px; padding: 20px; overflow-y: auto; }
        .batch-table, .scoreboard-table { width: 100%; border-collapse: collapse; font-size: 0.8rem; }
        .batch-table th, .batch-table td, .scoreboard-table th, .scoreboard-table td { border: 1px solid #ddd; padding: 8px 4px; text-align: center; vertical-align: middle; }
        .batch-table input { width: 80px; text-align: center; padding: 6px; }
        .score-full-input { width: 70px; text-align: center; background: #fff9e0; font-weight: bold; }
        .score-sub { font-size: 0.7rem; color: #6c86a3; margin-left: 3px; font-weight: normal; }
        .avg-text { font-weight: bold; background: #fef9e3; display: inline-block; padding: 4px 12px; border-radius: 24px; margin: 8px 0; }
        .rank-col { background: #f9f5e8; font-weight: 500; }
        .exam-card { margin-bottom: 40px; border-bottom: 2px solid #e2edf2; padding-bottom: 20px; }
        .exam-title { font-size: 1.2rem; font-weight: bold; margin: 16px 0 8px; color: #1e4a6b; border-left: 5px solid #2c6e9e; padding-left: 12px; }
        .trend-chart { margin-top: 30px; background: #f9fafb; border-radius: 24px; padding: 16px; }
        canvas { max-height: 280px; width: 100%; }
        .exam-selector { margin: 12px 0; display: flex; gap: 12px; align-items: center; flex-wrap: wrap; }
        .small-btn { padding: 6px 12px; font-size: 0.7rem; border-radius: 32px; background: #f1f5f9; cursor: pointer; }
        .home-btn { background: #e6f7e6; border-color: #b2d8a8; }
        @media (max-width: 640px) { .batch-table input { width: 60px; } .modal-content { padding: 12px; } }
    </style>
</head>
<body>
<div id="authPanel" class="auth-container"><h2><i class="fas fa-chalkboard-teacher"></i> 教师助手</h2>
    <div id="loginForm"><input type="text" id="loginUsername" placeholder="用户名"><input type="password" id="loginPassword" placeholder="密码"><button id="loginBtn">登录</button><button id="showRegisterBtn" class="toggle-btn">注册新账号</button><div id="loginError" class="error-msg"></div></div>
    <div id="registerForm" style="display:none;"><input type="text" id="regUsername" placeholder="用户名"><input type="password" id="regPassword" placeholder="密码"><input type="password" id="regConfirm" placeholder="确认密码"><button id="registerBtn">注册</button><button id="showLoginBtn" class="toggle-btn">返回登录</button><div id="regError" class="error-msg"></div></div>
</div>
<div id="mainApp" class="app-container">
    <div class="toolbar">
        <div class="class-section"><label><i class="fas fa-chalkboard-user"></i> 班级</label><select id="classSelect"></select><button id="newClassBtn" class="primary"><i class="fas fa-plus"></i> 新建</button><button id="deleteClassBtn" class="danger"><i class="fas fa-trash"></i> 删除</button></div>
        <div><input type="date" id="recordDate"></div>
        <button id="addStudentBtn" class="add-student-btn"><i class="fas fa-user-plus"></i> 添加学生</button>
        <button id="addBatchExamBtn" class="add-exam-btn"><i class="fas fa-pen-ruler"></i> 新增考试</button>
        <button id="pastExamsBtn" class="past-exam-btn"><i class="fas fa-history"></i> 过往考试</button>
        <button id="exportClassBtn" class="export-class-btn"><i class="fas file-arrow-down"></i> 导出班级数据</button>
        <button id="backupDataBtn" class="backup-btn"><i class="fas fa-download"></i> 备份</button>
        <button id="restoreDataBtn" class="restore-btn"><i class="fas fa-upload"></i> 恢复</button>
        <div class="user-info"><span id="currentUserDisplay"></span><button id="logoutBtn" class="logout-btn">退出</button></div>
    </div>
    <div class="search-area">
        <div class="search-group"><label>搜索班级</label><input type="text" id="searchClassInput" list="classListDatalist"><datalist id="classListDatalist"></datalist><button id="searchClassBtn" class="search-btn">🔎搜索</button></div>
        <div class="search-group"><label>搜索学员</label><input type="text" id="searchStudentInput" list="studentListDatalist"><datalist id="studentListDatalist"></datalist><button id="searchStudentBtn" class="search-btn">🔎搜索</button><div id="studentResultArea" class="student-result" style="display:none;"></div></div>
        <div><button id="homeBtn" class="home-btn"><i class="fas fa-home"></i> 取消</button></div>
    </div>
    <div class="student-table-wrapper"><table id="studentTable"><thead><tr><th>学生姓名</th><th>📅 当日出勤</th><th>📊 日常成绩</th><th>📚 作业提交</th><th>📖 详情 & 导出</th></tr></thead><tbody id="tableBody"></tbody></table></div>
    <footer><i class="fas fa-mobile-alt"></i> 点击日期切换填写时间 · 「一览」查看整体记录&成绩分析</footer>
</div>

<!-- 考试类型选择模态框 -->
<div id="examTypeModal" class="modal"><div class="modal-content" style="max-width:400px; text-align:center"><h3>选择考试类型</h3><button id="typeJLPT" class="primary" style="margin:8px;width:80%">📘 日语考级</button><button id="typeGaokao" class="primary" style="margin:8px;width:80%">📙 日语高考</button><button id="TypeKaoyan" class="primary" style="margin:8px;width:80%">📕 日语考研</button><button id="closeTypeModal" class="small-btn" style="margin-top:20px">取消</button></div></div>

<!-- 批量考试录入模态框 -->
<div id="batchExamModal" class="modal"><div class="modal-content"><div class="modal-header"><h3 id="batchExamTitle">批量录入考试</h3><button id="closeBatchModal" class="icon-btn"><i class="fas fa-times"></i></button></div>
    <div><label>考试名称：</label><input type="text" id="batchExamName" style="width:70%"><label style="margin-left:16px">考试日期：</label><input type="date" id="batchExamDate"></div>
    <div style="overflow-x:auto; margin-top:16px;"><table id="batchScoreTable" class="batch-table"><thead id="batchTableHead"></thead><tbody id="batchTableBody"></tbody></table></div>
    <div style="margin-top:20px; text-align:center"><button id="saveBatchExamBtn" class="primary">🌸 保存考试 (按总分排序后存储)</button></div>
</div></div>

<!-- 过往考试模态框（滚动展示所有考试+趋势图） -->
<div id="pastExamModal" class="modal"><div class="modal-content"><div class="modal-header"><h3><i class="fas fa-archive"></i> 过往考试成绩单</h3><button id="closePastModal" class="icon-btn"><i class="fas fa-times"></i></button></div>
    <div id="pastExamScoreboard" style="overflow-x:auto;"></div>
    <div id="trendChartContainer" class="trend-chart"><h4>📈 班级平均分趋势</h4><canvas id="avgScoreTrendCanvas" style="max-height:280px; width:100%"></canvas></div>
</div></div>

<!-- 学生详情模态框 -->
<div id="studentDetailModal" class="modal"><div class="modal-content" style="max-width: 900px;"><div class="modal-header"><h3><i class="fas fa-chart-line"></i> 学生档案 · <span id="detailStudentName"></span></h3><button id="closeDetailModalBtn" class="icon-btn"><i class="fas fa-times"></i></button></div>
    <div id="detailContent">加载中...</div><div style="margin-top: 20px; text-align:center;"><button id="exportSingleFromDetailBtn" class="small-btn primary"><i class="fas fa-download"></i> 导出该生所有数据(Excel)</button></div>
</div></div>

<script>
    // ---------- 用户 & 数据存储 ----------
    const USERS_KEY = "teacher_users";
    let currentUser = null, appData = null;
    let avgTrendChart = null, scoreChart = null, radarChart = null;

    function initUserStorage() { if(!localStorage.getItem(USERS_KEY)) localStorage.setItem(USERS_KEY, JSON.stringify([])); }
    function hashPassword(pwd) { return btoa(pwd); }
    function generateId() { return Date.now() + '-' + Math.random().toString(36).substr(2, 8); }
    function escapeHtml(str){ if(!str) return ''; return str.replace(/[&<>]/g, m=> ({'&':'&amp;','<':'&lt;','>':'&gt;'})[m]); }
    function persistAppData() { if(currentUser) localStorage.setItem(`userData_${currentUser.username}`, JSON.stringify(appData)); }

    function register(username, password) {
        const users = JSON.parse(localStorage.getItem(USERS_KEY));
        if(users.find(u=>u.username===username)) return { success:false, msg:"用户名已存在" };
        users.push({ username, passwordHash: hashPassword(password) });
        localStorage.setItem(USERS_KEY, JSON.stringify(users));
        const defaultData = { classes: [{ id: generateId(), name: "我的班级" }], currentClassId: null, students: [], dailyRecords: [], exams: [] };
        defaultData.currentClassId = defaultData.classes[0].id;
        localStorage.setItem(`userData_${username}`, JSON.stringify(defaultData));
        return { success:true };
    }
    function login(username, password) {
        const users = JSON.parse(localStorage.getItem(USERS_KEY));
        const user = users.find(u=>u.username===username);
        if(!user) return { success:false, msg:"用户不存在" };
        if(user.passwordHash !== hashPassword(password)) return { success:false, msg:"密码错误" };
        currentUser = { username };
        const stored = localStorage.getItem(`userData_${username}`);
        if(stored) { appData = JSON.parse(stored); migrateOldExams(); }
        else { const defaultClass = { id: generateId(), name: "我的班级" }; appData = { classes: [defaultClass], currentClassId: defaultClass.id, students: [], dailyRecords: [], exams: [] }; persistAppData(); }
        return { success:true };
    }
    function migrateOldExams() {
        if(!appData.exams) appData.exams = [];
        appData.exams = appData.exams.map(exam => {
            if(exam.sections) return exam;
            let sections = [];
            if(exam.vocabScore !== undefined) { sections.push({name:"词汇", score: exam.vocabScore||0, full:20}); sections.push({name:"语法", score: exam.grammarScore||0, full:20}); sections.push({name:"阅读", score: exam.readingScore||0, full:40}); sections.push({name:"听力", score: exam.listeningScore||0, full:20}); }
            else { sections = [{name:"总分", score: exam.totalScore || 0, full: exam.fullScore || 100}]; }
            const total = sections.reduce((s,item)=> s + (item.score||0),0);
            return { ...exam, sections, totalScore: total };
        });
        persistAppData();
    }
    function getCurrentStudents() { return appData.students.filter(s => s.classId === appData.currentClassId); }
    function getDailyRecord(studentId, date) { return appData.dailyRecords.find(r=>r.studentId===studentId && r.date===date); }
    function ensureDailyRecord(studentId, date) { let rec = getDailyRecord(studentId,date); if(!rec) { rec={id:generateId(), studentId, date, attendance:"", dailyScore:"", homework:"", remark:""}; appData.dailyRecords.push(rec); persistAppData(); } return rec; }
    function updateDailyField(studentId, date, field, value) { let rec = getDailyRecord(studentId,date); if(!rec) { rec={id:generateId(), studentId, date, attendance:"", dailyScore:"", homework:"", remark:""}; appData.dailyRecords.push(rec); } rec[field]=value; persistAppData(); }
    function getStudentExams(studentId) { return (appData.exams || []).filter(e=>e.studentId===studentId).sort((a,b)=>(a.examDate||'').localeCompare(b.examDate||'')); }
    function deleteStudent(studentId) { appData.students = appData.students.filter(s=>s.id!==studentId); appData.dailyRecords = appData.dailyRecords.filter(r=>r.studentId!==studentId); appData.exams = appData.exams.filter(e=>e.studentId!==studentId); persistAppData(); }
    function editStudentName(studentId,newName) { const s=appData.students.find(s=>s.id===studentId); if(s) { s.name=newName; persistAppData(); } }
    function addStudentToCurrentClass(name) { if(!appData.currentClassId) return false; if(getCurrentStudents().length>=50) { alert("最多50名学生"); return false; } appData.students.push({ id: generateId(), classId: appData.currentClassId, name: name.trim() }); persistAppData(); return true; }
    function getStudentClassName(studentId) { const s=appData.students.find(s=>s.id===studentId); if(!s) return "未知"; const cls=appData.classes.find(c=>c.id===s.classId); return cls?cls.name:"未知"; }

    // 主表格渲染
    let currentDate = "";
    function renderTable() {
        const picker = document.getElementById("recordDate");
        currentDate = picker ? picker.value : new Date().toISOString().slice(0,10);
        if(!currentDate) currentDate = new Date().toISOString().slice(0,10);
        const tbody = document.getElementById("tableBody");
        const students = getCurrentStudents();
        if(!appData.currentClassId || students.length===0) { tbody.innerHTML='<tr><td colspan="5" style="text-align:center">暂无学生，点击添加</td></tr>'; return; }
        const attendanceOpts=["","上课","迟到","早退","看录播","停课","其他"];
        const homeworkOpts=["","提交","未交","补交","其他"];
        let html = '';
        students.forEach(s => {
            const rec = ensureDailyRecord(s.id, currentDate);
            html += `<tr><td class="student-name-cell"><div class="name-wrapper"><span>${escapeHtml(s.name)}</span><div><button class="icon-btn edit-student" data-id="${s.id}"><i class="fas fa-pencil-alt"></i></button><button class="icon-btn delete-student" data-id="${s.id}"><i class="fas fa-trash"></i></button></div></div></td>
                <td><select class="attendance-select" data-sid="${s.id}" data-date="${currentDate}">${attendanceOpts.map(o=>`<option value="${o}" ${rec.attendance===o?'selected':''}>${o===""?"—无—":o}</option>`).join('')}</select></td>
                <td><input type="number" class="daily-score-input" data-sid="${s.id}" data-date="${currentDate}" value="${rec.dailyScore!==""?rec.dailyScore:''}" step="1" style="width:80px" placeholder="分数"></td>
                <td><select class="homework-select" data-sid="${s.id}" data-date="${currentDate}">${homeworkOpts.map(o=>`<option value="${o}" ${rec.homework===o?'selected':''}>${o===""?"—无—":o}</option>`).join('')}</select></td>
                <td class="action-btns"><button class="small-btn detail-view-btn" data-sid="${s.id}" data-name="${escapeHtml(s.name)}"><i class="fas fa-chart-line"></i> 一览</button><button class="small-btn export-student-btn" data-sid="${s.id}" data-name="${escapeHtml(s.name)}"><i class="fas fa-download"></i> 导出</button></td></tr>`;
        });
        tbody.innerHTML = html;
        document.querySelectorAll('.attendance-select').forEach(sel=>sel.addEventListener('change',e=>updateDailyField(sel.dataset.sid,sel.dataset.date,'attendance',sel.value)));
        document.querySelectorAll('.homework-select').forEach(sel=>sel.addEventListener('change',e=>updateDailyField(sel.dataset.sid,sel.dataset.date,'homework',sel.value)));
        document.querySelectorAll('.daily-score-input').forEach(inp=>inp.addEventListener('change',e=>{ let v=inp.value.trim(); if(v==="") v=""; else if(isNaN(v)) v=""; else v=Number(v); updateDailyField(inp.dataset.sid,inp.dataset.date,'dailyScore',v); }));
        document.querySelectorAll('.edit-student').forEach(btn=>btn.addEventListener('click',()=>{ let id=btn.dataset.id; let s=appData.students.find(s=>s.id===id); if(s){ let nn=prompt("新姓名",s.name); if(nn&&nn.trim()){ editStudentName(id,nn.trim()); renderTable(); renderClassSelect(); } } }));
        document.querySelectorAll('.delete-student').forEach(btn=>btn.addEventListener('click',()=>{ if(confirm("删除该生所有记录？")){ deleteStudent(btn.dataset.id); renderTable(); } }));
        document.querySelectorAll('.export-student-btn').forEach(btn=>btn.addEventListener('click',()=>exportStudentToExcel(btn.dataset.sid,btn.dataset.name)));
        document.querySelectorAll('.detail-view-btn').forEach(btn=>btn.addEventListener('click',()=>openStudentDetail(btn.dataset.sid,btn.dataset.name)));
    }

    // 批量考试
    let currentBatchType = null, currentFullConfig = {};
    function openExamTypeModal() { document.getElementById("examTypeModal").style.display="flex"; }
    function closeTypeModal() { document.getElementById("examTypeModal").style.display="none"; }
    function startBatchExam(type){
        currentBatchType=type;
        document.getElementById("batchExamTitle").innerText = `批量录入 - ${type==='jlpt'?'日语考级':type==='gaokao'?'日语高考':'日语考研'}`;
        const currentClass = appData.classes.find(c => c.id === appData.currentClassId);
        document.getElementById("batchExamName").value = currentClass ? currentClass.name : "未命名班级";
        document.getElementById("batchExamDate").value = new Date().toISOString().slice(0,10);
        const students = getCurrentStudents();
        if(students.length===0){ alert("当前班级没有学生，请先添加学生"); closeBatchModal(); return; }
        let headers = [], defaultFull = {};
        if(type === "jlpt"){ headers = ["词汇","语法","阅读","听力"]; defaultFull = {词汇:20,语法:20,阅读:40,听力:20}; }
        else if(type === "gaokao"){ headers = ["听力","阅读","完型","小作文","大作文"]; defaultFull = {听力:30,阅读:50,完型:30,小作文:10,大作文:30}; }
        else { headers = ["基础知识","阅读","作文"]; defaultFull = {基础知识:20,阅读:55,作文:25}; }
        currentFullConfig = {...defaultFull};
        let theadHtml = `<tr><th>学生姓名</th>${headers.map(h=>`<th>${h}得分<br><input type="number" class="score-full-input" data-section="${h}" value="${currentFullConfig[h]}" step="1" min="0" style="width:70px"> / 满分</th>`).join('')}<th>总得分</th></tr>`;
        let tbodyHtml = "";
        students.forEach(s=>{ tbodyHtml += `<tr><td><strong>${escapeHtml(s.name)}</strong></td>${headers.map(h=>`<td><input type="number" class="score-input" data-student="${s.id}" data-section="${h}" value="0" step="1" min="0" max="${currentFullConfig[h]}" style="width:80px"></td>`).join('')}<td class="total-cell" data-student="${s.id}">0</td></tr>`; });
        document.getElementById("batchTableHead").innerHTML = theadHtml;
        document.getElementById("batchTableBody").innerHTML = tbodyHtml;
        document.querySelectorAll(".score-full-input").forEach(inp=>{ inp.addEventListener("change",()=>{ let section = inp.dataset.section; let newFull = parseFloat(inp.value)||0; if(newFull>=0) currentFullConfig[section]=newFull; updateAllMaxAndTotal(); }); });
        document.querySelectorAll(".score-input").forEach(inp=>{ inp.addEventListener("input",()=>recalcTotalForAllStudents()); });
        recalcTotalForAllStudents();
        document.getElementById("batchExamModal").style.display="flex";
    }
    function updateAllMaxAndTotal(){
        document.querySelectorAll(".score-input").forEach(inp=>{ let section = inp.dataset.section; let maxVal = currentFullConfig[section]||0; inp.max = maxVal; if(parseFloat(inp.value)>maxVal) inp.value = maxVal; });
        recalcTotalForAllStudents();
    }
    function recalcTotalForAllStudents(){
        const students = getCurrentStudents();
        const rows = document.querySelectorAll("#batchTableBody tr");
        rows.forEach((row,idx)=>{ let studentId = students[idx]?.id; if(!studentId) return; let total=0; row.querySelectorAll(".score-input").forEach(inp=>{ let val=parseFloat(inp.value)||0; total+=val; }); let totalCell = row.querySelector(".total-cell"); if(totalCell) totalCell.innerText = total; });
    }
    function saveBatchExam(){
        if(!currentBatchType) return;
        const examName = document.getElementById("batchExamName").value.trim();
        if(!examName){ alert("请输入考试名称"); return; }
        const examDate = document.getElementById("batchExamDate").value;
        if(!examDate){ alert("请选择考试日期"); return; }
        const students = getCurrentStudents();
        if(students.length===0){ alert("无学生"); return; }
        let headers = [];
        if(currentBatchType==="jlpt") headers=["词汇","语法","阅读","听力"];
        else if(currentBatchType==="gaokao") headers=["听力","阅读","完型","小作文","大作文"];
        else headers=["基础知识","阅读","作文"];
        let examRecords = [];
        for(let i=0;i<students.length;i++){ const s=students[i]; const row = document.querySelectorAll("#batchTableBody tr")[i]; if(!row) continue;
            let sections = []; let totalScore=0;
            for(let h of headers){ let inp = row.querySelector(`.score-input[data-section="${h}"]`); let score = inp ? (parseFloat(inp.value)||0) : 0; let full = currentFullConfig[h]||0; sections.push({name:h, score:score, full:full}); totalScore+=score; }
            examRecords.push({ studentId:s.id, sections, totalScore });
        }
        const sortedRecords = [...examRecords].sort((a,b)=>b.totalScore - a.totalScore);
        for(let rec of sortedRecords){ const student = students.find(s=>s.id===rec.studentId); if(student){
            appData.exams.push({ id:generateId(), studentId:rec.studentId, examName, examDate, examType:currentBatchType, sections:rec.sections, totalScore:rec.totalScore });
        }}
        persistAppData();
        alert(`保存成功《${examName}》，成绩已按总分从高到低记录。`);
        closeBatchModal();
        renderTable();
    }
    function closeBatchModal(){ document.getElementById("batchExamModal").style.display="none"; currentBatchType=null; }

    // 过往考试：直接展示所有考试（最新在上）+ 均分趋势图
    function loadAllPastExams() {
        const students = getCurrentStudents();
        if(students.length===0) { alert("当前班级无学生，无法查看过往考试"); return; }
        const studentIds = new Set(students.map(s=>s.id));
        const examsInClass = appData.exams.filter(ex => studentIds.has(ex.studentId));
        if(examsInClass.length===0) { alert("暂无任何考试记录"); return; }
        const examGroups = new Map();
        examsInClass.forEach(ex => {
            const key = `${ex.examName}|${ex.examDate}|${ex.examType}`;
            if(!examGroups.has(key)) examGroups.set(key, { key, examName: ex.examName, examDate: ex.examDate, examType: ex.examType, exams: [] });
            examGroups.get(key).exams.push(ex);
        });
        let groupsArray = Array.from(examGroups.values());
        groupsArray.sort((a,b) => (b.examDate || '').localeCompare(a.examDate || ''));
        let allHtml = '';
        let trendData = [];
        for(let group of groupsArray) {
            const exams = group.exams;
            const examType = group.examType;
            const studentMap = new Map();
            exams.forEach(ex => { studentMap.set(ex.studentId, ex); });
            let sectionNames = [];
            if(examType === "jlpt") sectionNames = ["词汇","语法","阅读","听力"];
            else if(examType === "gaokao") sectionNames = ["听力","阅读","完型","小作文","大作文"];
            else sectionNames = ["基础知识","阅读","作文"];
            let rowsData = [];
            let sectionFullMap = {};
            for(let s of students) {
                const exam = studentMap.get(s.id);
                if(!exam) continue;
                const sectionScores = {};
                for(let sec of exam.sections) { sectionScores[sec.name] = { score: sec.score, full: sec.full }; if(!sectionFullMap[sec.name]) sectionFullMap[sec.name] = sec.full; }
                rowsData.push({ studentName: s.name, total: exam.totalScore, sectionScores });
            }
            rowsData.sort((a,b)=>b.total - a.total);
            let totalSum = 0, sectionSums = {};
            sectionNames.forEach(n => { sectionSums[n] = 0; });
            rowsData.forEach(r => { totalSum += r.total; sectionNames.forEach(n => { sectionSums[n] += r.sectionScores[n]?.score || 0; }); });
            const avgTotal = rowsData.length ? (totalSum / rowsData.length).toFixed(1) : 0;
            const avgSections = {};
            sectionNames.forEach(n => { avgSections[n] = rowsData.length ? (sectionSums[n] / rowsData.length).toFixed(1) : 0; });
            trendData.push({ label: `${group.examName} (${group.examDate})`, avgTotal: parseFloat(avgTotal) });
            let tableHtml = `<div class="exam-card"><div class="exam-title">📌 ${escapeHtml(group.examName)} &nbsp;|&nbsp; ${group.examDate} &nbsp;|&nbsp; ${examType==='jlpt'?'考级':examType==='gaokao'?'高考':'考研'}</div>
            <table class="scoreboard-table" style="font-size:0.75rem"><thead><tr><th>班级排名</th><th>学生姓名</th><th>总分</th>${sectionNames.map(n => `<th>${n}<span class="score-sub">(/${sectionFullMap[n]||0})</span></th>`).join('')}</tr></thead><tbody>`;
            rowsData.forEach((r, idx) => {
                tableHtml += `<tr><td class="rank-col">${idx+1}</td><td><strong>${escapeHtml(r.studentName)}</strong></td><td>${r.total}</td>`;
                sectionNames.forEach(n => { const sc = r.sectionScores[n] || { score: '-', full: sectionFullMap[n] }; tableHtml += `<td>${sc.score}<span class="score-sub">/${sc.full}</span></td>`; });
                tableHtml += `</tr>`;
            });
            tableHtml += `</tbody></table><div style="margin-top:12px;"><span class="avg-text">📊 班级平均总分：${avgTotal}</span>`;
            sectionNames.forEach(n => { tableHtml += `<span class="avg-text" style="margin-left:8px">📌 ${n}平均：${avgSections[n]} / ${sectionFullMap[n]}</span>`; });
            tableHtml += `</div></div>`;
            allHtml += tableHtml;
        }
        document.getElementById("pastExamScoreboard").innerHTML = allHtml;
        const ctx = document.getElementById('avgScoreTrendCanvas').getContext('2d');
        if(avgTrendChart) avgTrendChart.destroy();
        avgTrendChart = new Chart(ctx, { type:'line', data: { labels: trendData.map(d=>d.label), datasets: [{ label:'班级平均总分', data: trendData.map(d=>d.avgTotal), borderColor:'#e67e22', backgroundColor:'rgba(230,126,34,0.1)', tension:0.2, fill:true }] }, options: { responsive:true, maintainAspectRatio:true } });
    }

    // 学生详情 (出勤/作业状态颜色、总分曲线、雷达图)
    function formatAttendanceForDetail(status) {
        if (status === "迟到" || status === "早退") return `<span style="color: #f97316; font-weight: 500;">${escapeHtml(status)}</span>`;
        else if (status === "看录播" || status === "停课") return `<span style="color: #dc2626; font-weight: 500;">${escapeHtml(status)}</span>`;
        return escapeHtml(status);
    }
    function formatHomeworkForDetail(status) { return status === "未交" ? `<span style="color: #dc2626; font-weight: 500;">${escapeHtml(status)}</span>` : escapeHtml(status); }
    function openStudentDetail(studentId,studentName){
        currentDetailStudentId=studentId; document.getElementById("detailStudentName").innerText=studentName;
        document.getElementById("studentDetailModal").style.display="flex"; renderDetailContent(studentId);
    }
    let currentDetailStudentId=null;
    function renderDetailContent(studentId){
        const container=document.getElementById("detailContent");
        const exams = getStudentExams(studentId);
        const dailyRecs = appData.dailyRecords.filter(r=>r.studentId===studentId);
        const className = getStudentClassName(studentId);
        let html = `<div><h4>📋 出勤/日常成绩/作业一览</h4><table style="width:100%; border-collapse:collapse;"><tr><th>日期</th><th>班级</th><th>出勤</th><th>日常成绩</th><th>作业</th><th>备注</th></tr>`;
        [...dailyRecs].sort((a,b)=>b.date.localeCompare(a.date)).slice(0,20).forEach(r=>{ 
            html+=`<tr><td>${r.date}</td><td>${escapeHtml(className)}</td><td>${formatAttendanceForDetail(r.attendance||"-")}</td><td>${r.dailyScore!==""?r.dailyScore:"-"}</td><td>${formatHomeworkForDetail(r.homework||"-")}</td><td><input type="text" class="remark-quick" data-sid="${studentId}" data-date="${r.date}" value="${escapeHtml(r.remark||'')}" placeholder="备注"></td></tr>`;
        });
        html+=`</table></div><div><h4>📈 历次考试总分趋势</h4><canvas id="scoreTrendCanvas" style="max-height:200px"></canvas></div><div><h4>📡 各题型得分率一览</h4><div class="exam-selector"><label>选择考试：</label><select id="radarExamSelect"></select></div><canvas id="radarChartCanvas" style="max-height:260px"></canvas></div>`;
        container.innerHTML=html;
        document.querySelectorAll('.remark-quick').forEach(inp=>{ inp.addEventListener('change',e=>{ updateDailyField(inp.dataset.sid, inp.dataset.date, 'remark', inp.value); }); });
        if(exams.length>0){
            const labels=exams.map(e=>e.examName.length>12?e.examName.slice(0,10)+'..':e.examName);
            const totals=exams.map(e=>e.totalScore);
            const ctx=document.getElementById('scoreTrendCanvas').getContext('2d');
            if(scoreChart) scoreChart.destroy();
            scoreChart = new Chart(ctx,{ type:'line', data:{ labels, datasets:[{ label:'总分', data:totals, borderColor:'#2c6e9e', tension:0.2, fill:false }] }, options:{ responsive:true, maintainAspectRatio:true } });
        } else { document.getElementById('scoreTrendCanvas')?.remove(); container.innerHTML+='<div>暂无考试数据，请添加考试</div>'; }
        const selectBox = document.getElementById("radarExamSelect");
        if(selectBox && exams.length>0){
            selectBox.innerHTML = exams.map((e,idx)=>`<option value="${idx}">${e.examName} (${e.examDate||'无日期'})</option>`).join('');
            selectBox.onchange = () => { const idx=selectBox.value; if(exams[idx]) renderRadarForExam(exams[idx]); };
            renderRadarForExam(exams[0]);
        } else if(selectBox){ selectBox.innerHTML='<option>暂无考试</option>'; if(radarChart){radarChart.destroy(); radarChart=null;} }
    }
    function renderRadarForExam(exam){
        if(!exam.sections || exam.sections.length===0) return;
        const labels = exam.sections.map(s=>s.name);
        const scoreRates = exam.sections.map(s=> (s.score / (s.full||1)) * 100 );
        const ctx = document.getElementById('radarChartCanvas')?.getContext('2d');
        if(!ctx) return;
        if(radarChart) radarChart.destroy();
        radarChart = new Chart(ctx,{ type:'radar', data:{ labels, datasets:[{ label:'得分率 (%)', data:scoreRates, backgroundColor:'rgba(44,110,158,0.2)', borderColor:'#2c6e9e', pointBackgroundColor:'#1e4a6b', fill:true }] }, options:{ responsive:true, maintainAspectRatio:true, scales:{ r:{ beginAtZero:true, max:100, ticks:{ stepSize:20 } } } } });
    }

    // 导出
    function exportStudentToExcel(studentId,studentName){
        const dailyRecs = appData.dailyRecords.filter(r=>r.studentId===studentId).sort((a,b)=>a.date.localeCompare(b.date));
        const exams = getStudentExams(studentId);
        const className = getStudentClassName(studentId);
        const dailySheet = [["日期","班级名称","出勤状态","日常成绩","作业提交","备注"]];
        dailyRecs.forEach(r=>dailySheet.push([r.date, className, r.attendance||"", r.dailyScore!==""?r.dailyScore:"-", r.homework||"", r.remark||""]));
        const examSheet = [["考试名称","考试日期","考试类型","题型详情(得分/满分)","总分"]];
        exams.forEach(e=>{ let detail = e.sections.map(s=>`${s.name}:${s.score}/${s.full}`).join("; "); examSheet.push([e.examName, e.examDate||"-", e.examType||"-", detail, e.totalScore]); });
        const wb = XLSX.utils.book_new();
        XLSX.utils.book_append_sheet(wb, XLSX.utils.aoa_to_sheet(dailySheet), "日常记录");
        XLSX.utils.book_append_sheet(wb, XLSX.utils.aoa_to_sheet(examSheet), "考试成绩");
        XLSX.writeFile(wb, `${studentName}_全记录.xlsx`);
    }
    function exportClassToExcel(){
        if(!appData.currentClassId) return;
        const students=getCurrentStudents();
        if(students.length===0){ alert("无学生"); return; }
        let allDaily=[], allExams=[];
        students.forEach(s=>{ const dailyList=appData.dailyRecords.filter(r=>r.studentId===s.id); const cname=getStudentClassName(s.id); dailyList.forEach(r=>allDaily.push({学生姓名:s.name,日期:r.date,班级:cname,出勤:r.attendance||"",日常成绩:r.dailyScore!==""?r.dailyScore:"-",作业:r.homework||"",备注:r.remark||""}));
            const exams=getStudentExams(s.id); exams.forEach(e=>{ let detail=e.sections.map(sec=>`${sec.name}:${sec.score}/${sec.full}`).join(";"); allExams.push({学生姓名:s.name,考试名称:e.examName,日期:e.examDate,类型:e.examType,题型明细:detail,总分:e.totalScore}); });
        });
        const dailyData=[["学生姓名","日期","班级","出勤","日常成绩","作业","备注"],...allDaily.map(d=>[d.学生姓名,d.日期,d.班级,d.出勤,d.日常成绩,d.作业,d.备注])];
        const examData=[["学生姓名","考试名称","日期","类型","题型及得分/满分","总分"],...allExams.map(e=>[e.学生姓名,e.考试名称,e.日期,e.类型,e.题型明细,e.总分])];
        const wb=XLSX.utils.book_new(); XLSX.utils.book_append_sheet(wb,XLSX.utils.aoa_to_sheet(dailyData),"全班日常"); XLSX.utils.book_append_sheet(wb,XLSX.utils.aoa_to_sheet(examData),"全班考试");
        const cls=appData.classes.find(c=>c.id===appData.currentClassId)?.name||"班级"; XLSX.writeFile(wb,`${cls}_完整数据.xlsx`);
    }

    // 班级管理
    function renderClassSelect(){ const sel=document.getElementById("classSelect"); sel.innerHTML=''; appData.classes.forEach(cls=>{ const opt=document.createElement("option"); opt.value=cls.id; opt.textContent=cls.name; if(appData.currentClassId===cls.id) opt.selected=true; sel.appendChild(opt); }); if(appData.classes.length===0) sel.innerHTML='<option>请新建班级</option>'; }
    function onClassChange(){ const newId=document.getElementById("classSelect").value; if(newId){ appData.currentClassId=newId; persistAppData(); renderTable(); } }
    function newClass(){ let name=prompt("班级名称","新班级"); if(name && name.trim()){ const id=generateId(); appData.classes.push({id,name:name.trim()}); appData.currentClassId=id; persistAppData(); renderClassSelect(); renderTable(); } }
    function deleteCurrentClass(){ if(!appData.currentClassId) return; if(confirm("删除班级及所有数据？")){ const cid=appData.currentClassId; appData.classes=appData.classes.filter(c=>c.id!==cid); appData.students=appData.students.filter(s=>s.classId!==cid); appData.dailyRecords=appData.dailyRecords.filter(r=>!appData.students.some(s=>s.id===r.studentId)); appData.exams=appData.exams.filter(e=>!appData.students.some(s=>s.id===e.studentId)); if(appData.classes.length>0) appData.currentClassId=appData.classes[0].id; else appData.currentClassId=null; persistAppData(); renderClassSelect(); renderTable(); } }
    function addStudentFlow(){ if(!appData.currentClassId){ alert("先选择班级"); return; } let name=prompt("学生姓名"); if(name && name.trim()){ addStudentToCurrentClass(name.trim()); renderTable(); } }
    function updateClassDatalist(){ const dl=document.getElementById("classListDatalist"); dl.innerHTML=''; appData.classes.forEach(c=>{let o=document.createElement("option"); o.value=c.name; dl.appendChild(o);}); }
    function updateStudentDatalist(){ const dl=document.getElementById("studentListDatalist"); dl.innerHTML=''; appData.students.forEach(s=>{let o=document.createElement("option"); o.value=s.name; dl.appendChild(o);}); }
    function searchClass(){ const inp=document.getElementById("searchClassInput").value.trim(); if(!inp){alert("输入班级名");return;} const found=appData.classes.find(c=>c.name===inp); if(found){ appData.currentClassId=found.id; persistAppData(); renderClassSelect(); renderTable(); document.getElementById("studentResultArea").style.display="none"; }else alert("未找到"); }
    function searchStudent(){ const inp=document.getElementById("searchStudentInput").value.trim(); if(!inp)return; const matches=appData.students.filter(s=>s.name===inp); const area=document.getElementById("studentResultArea"); area.innerHTML=''; if(matches.length===0){ alert("未找到"); area.style.display="none"; return; } matches.forEach(s=>{ const cls=appData.classes.find(c=>c.id===s.classId); if(cls){ let div=document.createElement("div"); div.className="student-result-item"; div.innerHTML=`<span>📌 ${escapeHtml(s.name)} - 班级：<strong>${escapeHtml(cls.name)}</strong></span><button class="class-link" data-cid="${cls.id}">跳转</button>`; area.appendChild(div); } }); area.style.display="block"; area.querySelectorAll('.class-link').forEach(btn=>btn.addEventListener('click',()=>{ appData.currentClassId=btn.dataset.cid; persistAppData(); renderClassSelect(); renderTable(); area.style.display="none"; document.getElementById("searchStudentInput").value=""; })); }
    function goHome(){ document.getElementById("searchClassInput").value=""; document.getElementById("searchStudentInput").value=""; document.getElementById("studentResultArea").style.display="none"; renderTable(); }
    function backupData(){ if(!currentUser)return; const backup={username:currentUser.username,data:appData,exportTime:new Date().toISOString()}; const blob=new Blob([JSON.stringify(backup,null,2)],{type:"application/json"}); const a=document.createElement("a"); a.href=URL.createObjectURL(blob); a.download=`日语教学助手_${currentUser.username}_${new Date().toISOString().slice(0,19).replace(/:/g,'-')}.json`; a.click(); URL.revokeObjectURL(a.href); alert("备份已导出"); }
    function restoreData(){ const inp=document.getElementById("restoreFileInput"); inp.onchange=e=>{ const file=e.target.files[0]; if(!file)return; const reader=new FileReader(); reader.onload=ev=>{ try{ const bk=JSON.parse(ev.target.result); if(bk.username!==currentUser.username){ alert(`备份属于用户${bk.username}`); inp.value=""; return; } if(confirm("覆盖当前所有数据？不可撤销")){ appData=bk.data; if(!appData.exams)appData.exams=[]; migrateOldExams(); persistAppData(); renderClassSelect(); renderTable(); alert("恢复成功"); } }catch(e){ alert("恢复失败"); }finally{ inp.value=""; } }; reader.readAsText(file); }; inp.click(); }
    function logout(){ currentUser=null; localStorage.removeItem("currentUser"); document.getElementById("authPanel").style.display="block"; document.getElementById("mainApp").style.display="none"; }
    function initMainApp(){ document.getElementById("authPanel").style.display="none"; document.getElementById("mainApp").style.display="block"; document.getElementById("currentUserDisplay").innerHTML=`<i class="fas fa-user"></i> ${currentUser.username}`; renderClassSelect(); document.getElementById("recordDate").value=new Date().toISOString().slice(0,10); document.getElementById("recordDate").addEventListener("change",()=>renderTable()); document.getElementById("classSelect").addEventListener("change",onClassChange); document.getElementById("newClassBtn").onclick=newClass; document.getElementById("deleteClassBtn").onclick=deleteCurrentClass; document.getElementById("addStudentBtn").onclick=addStudentFlow; document.getElementById("exportClassBtn").onclick=exportClassToExcel; document.getElementById("logoutBtn").onclick=logout; document.getElementById("searchClassBtn").onclick=searchClass; document.getElementById("searchStudentBtn").onclick=searchStudent; document.getElementById("homeBtn").onclick=goHome; document.getElementById("backupDataBtn").onclick=backupData; document.getElementById("restoreDataBtn").onclick=restoreData; document.getElementById("addBatchExamBtn").onclick=openExamTypeModal; document.getElementById("pastExamsBtn").onclick=()=>{ loadAllPastExams(); document.getElementById("pastExamModal").style.display="flex"; }; document.getElementById("closePastModal").onclick=()=>document.getElementById("pastExamModal").style.display="none"; document.getElementById("closeTypeModal").onclick=closeTypeModal; document.getElementById("typeJLPT").onclick=()=>{ closeTypeModal(); startBatchExam("jlpt"); }; document.getElementById("typeGaokao").onclick=()=>{ closeTypeModal(); startBatchExam("gaokao"); }; document.getElementById("TypeKaoyan").onclick=()=>{ closeTypeModal(); startBatchExam("kaoyan"); }; document.getElementById("closeBatchModal").onclick=closeBatchModal; document.getElementById("saveBatchExamBtn").onclick=saveBatchExam; document.getElementById("closeDetailModalBtn").onclick=()=>{ document.getElementById("studentDetailModal").style.display="none"; if(radarChart){radarChart.destroy(); radarChart=null;} }; document.getElementById("exportSingleFromDetailBtn").onclick=()=>{ if(currentDetailStudentId){ const s=appData.students.find(s=>s.id===currentDetailStudentId); if(s) exportStudentToExcel(s.id,s.name); } }; updateClassDatalist(); updateStudentDatalist(); renderTable(); }

    // 启动
    initUserStorage();
    window.addEventListener("beforeunload",()=>{ if(currentUser) localStorage.setItem("currentUser",JSON.stringify({username:currentUser.username})); else localStorage.removeItem("currentUser"); });
    document.getElementById("showRegisterBtn").onclick=()=>{ document.getElementById("loginForm").style.display="none"; document.getElementById("registerForm").style.display="block"; };
    document.getElementById("showLoginBtn").onclick=()=>{ document.getElementById("loginForm").style.display="block"; document.getElementById("registerForm").style.display="none"; };
    document.getElementById("loginBtn").onclick=()=>{ const un=document.getElementById("loginUsername").value.trim(), pwd=document.getElementById("loginPassword").value; if(!un||!pwd){document.getElementById("loginError").innerText="输入完整";return;} const res=login(un,pwd); if(res.success) initMainApp(); else document.getElementById("loginError").innerText=res.msg; };
    document.getElementById("registerBtn").onclick=()=>{ const un=document.getElementById("regUsername").value.trim(), pwd=document.getElementById("regPassword").value, cf=document.getElementById("regConfirm").value; if(!un||!pwd){document.getElementById("regError").innerText="用户名/密码不能为空";return;} if(pwd!==cf){document.getElementById("regError").innerText="两次密码不一致";return;} const res=register(un,pwd); if(res.success){ alert("注册成功，请登录"); document.getElementById("showLoginBtn").click(); }else document.getElementById("regError").innerText=res.msg; };
    const saved=localStorage.getItem("currentUser");
    if(saved){ const user=JSON.parse(saved); const users=JSON.parse(localStorage.getItem(USERS_KEY)); if(users.find(u=>u.username===user.username)){ currentUser=user; loadUserData(user.username); initMainApp(); } else localStorage.removeItem("currentUser"); }
    else{ document.getElementById("authPanel").style.display="block"; document.getElementById("mainApp").style.display="none"; }
</script>
